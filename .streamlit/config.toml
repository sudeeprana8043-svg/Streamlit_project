[theme]
primaryColor = "#FF6B35"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
maxUploadSize = 200
enableRunOnSave = true
runOnSave = true

[logger]
level = "info"

[client]
showErrorDetails = true
toolbarMode = "developer"

[browser]
gatherUsageStats = false
